
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comparador de Destinos: Voos a partir de Porto Alegre/RS - LetsFG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --success: #059669;
            --danger: #dc2626;
            --divider: #f1f5f9;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -4px rgba(0, 0, 0, 0.04);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            padding: 20px 16px 60px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
            padding: 20px 0;
        }

        h1 {
            font-weight: 800;
            font-size: clamp(1.75rem, 5vw, 2.5rem);
            color: var(--text-primary);
            margin-bottom: 12px;
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: clamp(0.875rem, 3vw, 1.05rem);
            font-weight: 500;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 16px;
        }
        
        .subtitle-item {
            display: inline-flex;
            align-items: center;
        }

        #flights-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .flight-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .flight-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
            border-color: #cbd5e1;
        }

        .dest-badge {
            padding: 10px 16px;
            font-size: 0.9rem;
            font-weight: 700;
            color: white;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .card-content {
            padding: 24px;
        }

        .legs {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .leg {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .leg-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .leg-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            font-weight: 700;
            background: var(--bg);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .airlines {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .route {
            display: grid;
            grid-template-columns: minmax(60px, auto) 1fr minmax(60px, auto);
            align-items: center;
            gap: 16px;
        }

        .route-point {
            text-align: center;
        }
        
        .route-point.left { text-align: left; }
        .route-point.right { text-align: right; }

        .time {
            font-size: clamp(1.25rem, 4vw, 1.5rem);
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .airport {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 4px;
        }

        .flight-path {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .duration {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 6px;
        }

        .line-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #cbd5e1;
            border: 2px solid var(--surface);
            box-shadow: 0 0 0 1px #cbd5e1;
            z-index: 1;
        }

        .line {
            flex: 1;
            height: 2px;
            background-color: #cbd5e1;
            margin: 0 -2px;
        }

        .stops {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 6px;
        }

        .stops.direct {
            color: var(--success);
            font-weight: 600;
        }

        .divider {
            height: 1px;
            background-color: var(--divider);
            margin: 0;
            border: none;
        }

        .price-action {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: end;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--divider);
            gap: 16px;
        }

        .price-col {
            display: flex;
            flex-direction: column;
        }
        
        .price-col.left { align-items: flex-start; }
        .price-col.center { align-items: center; }
        .price-col.right { align-items: flex-end; text-align: right; }

        .price-leg {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .price-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            font-weight: 700;
            margin-bottom: 6px;
        }

        .price {
            font-size: clamp(1.75rem, 5vw, 2.25rem);
            font-weight: 800;
            color: var(--success);
            line-height: 1;
        }

        .price-sub {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .price-diff {
            font-size: 0.85rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 12px;
        }
        
        .diff-down { background: #dcfce7; color: #166534; }
        .diff-up   { background: #fee2e2; color: #991b1b; }
        .diff-same { background: #f1f5f9; color: #475569; }

        .btn-book {
            background-color: var(--accent);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .btn-book:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        /* Responsividade */
        @media (max-width: 640px) {
            .card-content {
                padding: 16px;
            }
            
            .route {
                gap: 10px;
            }

            .price-action {
                grid-template-columns: 1fr;
                gap: 20px;
                text-align: center;
                align-items: center;
            }

            .price-col.left, .price-col.center, .price-col.right {
                align-items: center;
                text-align: center;
            }
            
            .price-col.left {
                flex-direction: row;
                justify-content: center;
                gap: 16px;
                padding-bottom: 16px;
                border-bottom: 1px solid var(--divider);
                width: 100%;
            }
            
            .price-leg {
                margin-bottom: 0;
            }

            .price-diff {
                margin-bottom: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✈️ Para onde viajar?</h1>
            <div class="subtitle">
                <span class="subtitle-item">Saindo de <strong>&nbsp;Porto Alegre/RS</strong></span>
                <span class="subtitle-item" style="color:var(--border)">|</span>
                <span class="subtitle-item">Ida: <strong>&nbsp;2026-04-30</strong></span>
                <span class="subtitle-item" style="color:var(--border)">|</span>
                <span class="subtitle-item">Volta: <strong>&nbsp;2026-05-03</strong></span>
            </div>
        </header>
        
        <div class="server-status" style="text-align: center; margin-top: -16px; margin-bottom: 24px; font-size: 0.85rem; color: var(--text-secondary); display: flex; justify-content: center; align-items: center; gap: 8px;">
            <span>Última atualização: <strong>08/05/2026 às 10:53</strong></span>
            <span style="color:var(--border)">|</span>
            <span id="status-indicator" style="display: inline-flex; align-items: center; gap: 4px;">
                <span id="status-dot" style="width: 8px; height: 8px; border-radius: 50%; background-color: gray;"></span>
                <span id="status-text">Verificando status...</span>
            </span>
        </div>

        <div class="filters-container" style="display: flex; justify-content: flex-end; margin-bottom: 24px;">
            <div style="display: inline-flex; align-items: center; background: var(--surface); padding: 4px 8px; border-radius: 8px; border: 1px solid var(--border); box-shadow: var(--shadow);">
                <label for="sort-select" style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); margin-right: 8px;">Ordenar por:</label>
                <select id="sort-select" style="border: none; background: transparent; font-family: inherit; font-size: 0.9rem; font-weight: 600; color: var(--text-primary); cursor: pointer; outline: none;">
                    <option value="price">Menor Preço</option>
                    <option value="discount">Maior Desconto</option>
                </select>
            </div>
        </div>

        <div id="flights-container">
            
        </div>
    </div>

    <script>
        const lastSearchIso = "2026-05-08T10:53:56.526736";
        
        function checkServerStatus() {
            const lastSearchTime = new Date(lastSearchIso).getTime();
            const now = new Date().getTime();
            const diffHours = (now - lastSearchTime) / (1000 * 60 * 60);
            
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            
            if (diffHours < 24) {
                dot.style.backgroundColor = 'var(--success)';
                dot.style.boxShadow = '0 0 8px var(--success)';
                text.textContent = 'Servidor Online';
                text.style.color = 'var(--success)';
                text.style.fontWeight = '600';
            } else {
                dot.style.backgroundColor = 'var(--danger)';
                dot.style.boxShadow = '0 0 8px var(--danger)';
                text.textContent = 'Servidor Offline (Desatualizado)';
                text.style.color = 'var(--danger)';
                text.style.fontWeight = '600';
            }
        }

        function sortFlights() {
            const container = document.getElementById('flights-container');
            const cards = Array.from(container.getElementsByClassName('flight-card'));
            const sortBy = document.getElementById('sort-select').value;

            cards.sort((a, b) => {
                if (sortBy === 'price') {
                    const priceA = parseFloat(a.getAttribute('data-price')) || 0;
                    const priceB = parseFloat(b.getAttribute('data-price')) || 0;
                    return priceA - priceB;
                } else if (sortBy === 'discount') {
                    const discA = parseFloat(a.getAttribute('data-discount')) || 0;
                    const discB = parseFloat(b.getAttribute('data-discount')) || 0;
                    // Queremos o maior desconto primeiro. O desconto é diff_pct, onde valores negativos significam desconto.
                    // Portanto, o menor valor (mais negativo) é o maior desconto.
                    // Então a ordem crescente atende o "maior desconto".
                    return discA - discB;
                }
            });

            cards.forEach(card => container.appendChild(card));
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkServerStatus();
            document.getElementById('sort-select').addEventListener('change', sortFlights);
        });
    </script>
</body>
</html>
