name: Scheduled Flight Search

on:
  schedule:
    - cron: '30 9 * * *'   # 06:30 BRT (UTC-3)
    - cron: '0 22 * * *'   # 19:00 BRT (UTC-3)
  workflow_dispatch: # Permite rodar manualmente

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessário para o bot poder commitar de volta no repositório

    steps:
    - name: Checkout repositório
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install letsfg airportsdata
        playwright install chromium
        playwright install-deps chromium

    - name: Executar busca de voos
      run: python search_multi_dest.py

    - name: Commitar e enviar atualizações
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add index_multidestino.html historico_precos.json
        # Se não houver mudanças, o commit vai falhar, então usamos || true
        git commit -m "Atualização automática dos preços de voos" || true
        git push
